<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>schemzip</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #0f141b;
      --text: #e6edf3;
      --muted: #8b949e;
      --border: #30363d;
      --accent: #f59e0b;
      --accent-2: #22c55e;
      --danger: #ef4444;
      --shadow: rgba(0, 0, 0, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background:
        radial-gradient(circle at top left, rgba(245, 158, 11, 0.18), transparent 26%),
        radial-gradient(circle at top right, rgba(34, 197, 94, 0.16), transparent 22%),
        linear-gradient(180deg, #0b0f14 0%, #10161f 100%);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .app {
      flex: 1;
      display: grid;
      gap: 16px;
      min-height: 0;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .viewer {
      border: 1px solid var(--border);
      background: rgba(22, 27, 34, 0.88);
      box-shadow: 0 18px 48px var(--shadow);
      backdrop-filter: blur(10px);
    }

    .pill {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(15, 20, 27, 0.8);
      color: var(--muted);
      white-space: nowrap;
    }

    .toolbar {
      padding: 16px 20px;
      display: grid;
      gap: 12px;
    }

    .toolbar-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar button {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(245, 158, 11, 0.18), rgba(245, 158, 11, 0.1));
      color: var(--text);
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
    }

    .toolbar button:hover {
      border-color: rgba(245, 158, 11, 0.45);
    }

    .toolbar .hint {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .toolbar input[type="text"] {
      width: min(100%, 420px);
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(15, 20, 27, 0.95);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.82rem;
      border: 1px solid transparent;
    }

    .badge.ok {
      color: #bbf7d0;
      background: rgba(34, 197, 94, 0.14);
      border-color: rgba(34, 197, 94, 0.24);
    }

    .badge.warn {
      color: #fde68a;
      background: rgba(245, 158, 11, 0.14);
      border-color: rgba(245, 158, 11, 0.24);
    }

    .badge.error {
      color: #fecaca;
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.24);
    }

    .details {
      color: var(--muted);
      line-height: 1.55;
      display: grid;
      gap: 6px;
      word-break: break-word;
    }

    .details code {
      color: var(--text);
    }

    .debug {
      color: var(--muted);
      line-height: 1.55;
      display: grid;
      gap: 10px;
      word-break: break-word;
      padding: 16px 20px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(10, 14, 20, 0.92);
      box-shadow: 0 18px 48px var(--shadow);
    }

    .debug.hidden {
      display: none;
    }

    .debug h2 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .debug pre {
      margin: 0;
      padding: 12px 14px;
      max-height: 220px;
      overflow: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(15, 20, 27, 0.95);
      color: #93c5fd;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .viewer {
      border-radius: 18px;
      overflow: hidden;
      position: relative;
      min-height: 0;
    }

    .viewer iframe {
      border: 0;
      width: 100%;
      height: 100%;
      min-height: 0;
      display: block;
      background: #fff;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      background: linear-gradient(180deg, rgba(15, 20, 27, 0.86), rgba(15, 20, 27, 0.7));
    }

    .overlay.hidden {
      display: none;
    }

    .overlay pre {
      margin: 12px 0 0;
      max-width: 100%;
      white-space: pre-wrap;
      text-align: left;
      color: #fca5a5;
    }

    @media (max-width: 720px) {
      body {
        padding: 12px;
      }

      .app {
        min-height: 0;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="debug hidden" id="debug-panel" aria-label="Debug log">
      <h2>Debug Log</h2>
      <pre id="debug-log"></pre>
    </section>

    <section class="toolbar" aria-label="Editor tools">
      <div class="toolbar-row">
        <button type="button" id="new-file">New</button>
        <button type="button" id="open-file">Open</button>
        <input id="filename" type="text" value="diagram.drawio" spellcheck="false" />
        <span class="badge warn" id="state-badge">Loading</span>
        <span class="pill" id="payload-pill">payload: pending</span>
        <span class="hint" id="toolbar-hint">Blank diagram ready.</span>
      </div>
      <input id="drawio-file" type="file" accept=".drawio,.xml,application/xml,text/xml" hidden />
    </section>

    <section class="viewer">
      <div class="overlay" id="overlay">
        Waiting for archive decode.
      </div>
      <iframe
        id="editor"
        title="draw.io embed"
        referrerpolicy="no-referrer"
        allow="fullscreen"
      ></iframe>
    </section>
  </main>

  <script type="module" src="./schemzip-web.js"></script>
</body>
</html>
