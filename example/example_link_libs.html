<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>draw.io Embed — Analog Stencils</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #e94560;
      letter-spacing: 0.5px;
    }
    header .badge {
      margin-left: auto;
      font-size: 11px;
      background: #0f3460;
      border: 1px solid #e94560;
      color: #e94560;
      padding: 2px 10px;
      border-radius: 20px;
    }
    #status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 20px;
      background: #0d1b2a;
      border-bottom: 1px solid #0f3460;
      font-size: 12px;
      color: #888;
      flex-shrink: 0;
    }
    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f0a500;
      animation: pulse 1.5s infinite;
    }
    #status-dot.ready { background: #4caf50; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }
    #diagram-container { flex: 1; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="64" height="64" rx="10" fill="#e94560"/>
    <text x="32" y="44" text-anchor="middle" font-size="28" font-family="Arial Black" fill="white">d</text>
  </svg>
  <h1>draw.io Embed — Analog Stencils</h1>
  <span class="badge">Custom Library</span>
</header>

<div id="status-bar">
  <span id="status-dot"></span>
  <span id="status-text">正在初始化 draw.io…</span>
</div>

<div id="diagram-container">
  <iframe id="drawio-frame" allow="clipboard-read; clipboard-write"></iframe>
</div>

<script>
  const LIBRARY_URL = 'https://raw.githubusercontent.com/rcliu1975/schemzip/refs/heads/main/Analog.xml';
  const frame = document.getElementById('drawio-frame');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');

  function setStatus(msg, ready) {
    statusText.textContent = msg;
    if (ready) statusDot.classList.add('ready');
  }

  async function init() {
    setStatus('正在下載 Analog stencil library…');
    try {
      // 1. 抓取 library XML
      const resp = await fetch(LIBRARY_URL);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const xml = await resp.text();

      // 2. 將 library XML 存入 localStorage，key 用 draw.io 慣例格式
      //    draw.io 啟動時會讀取 localStorage 中的 custom libraries
      const libraryKey = 'mxCustomLibraries';
      const entry = { title: 'Analog', xml: xml };
      localStorage.setItem(libraryKey, JSON.stringify([entry]));

      // 3. 用 URL 參數 clibs 帶入 library（官方支援方式）
      //    clibs 格式：U<encoded_url> 讓 draw.io 自行 fetch
      const encodedUrl = encodeURIComponent(LIBRARY_URL);
      const drawioSrc = `https://embed.diagrams.net/?embed=1&proto=json&spin=1&libraries=1` +
        `&noSaveBtn=0&saveAndExit=0&noExitBtn=1&ui=min` +
        `&clibs=U${encodedUrl}`;

      frame.src = drawioSrc;
      setStatus('draw.io 載入中，請稍候…');
    } catch (err) {
      setStatus('初始化失敗：' + err.message);
      console.error(err);
    }
  }

  window.addEventListener('message', function (evt) {
    let data;
    try {
      data = typeof evt.data === 'string' ? JSON.parse(evt.data) : evt.data;
    } catch { return; }
    if (!data || !data.event) return;

    if (data.event === 'init') {
      setStatus('draw.io 初始化完成，正在載入空白圖表…');
      frame.contentWindow.postMessage(JSON.stringify({
        action: 'load',
        xml: '<mxGraphModel><root><mxCell id="0"/><mxCell id="1" parent="0"/></root></mxGraphModel>'
      }), '*');
      setStatus('Analog stencil library 已載入 ✓（左側面板可找到）', true);
    } else if (data.event === 'save' || data.event === 'autosave') {
      setStatus('圖表已儲存 ✓', true);
    }
  });

  // 啟動
  init();
</script>

</body>
</html>
